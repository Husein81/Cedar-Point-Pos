# ==============================================================================
# Production Docker Compose Override
# ==============================================================================
# This file extends docker-compose.yml for production deployment with:
#   - Optimized builds
#   - No source code mounting
#   - Production-only dependencies
#   - Resource limits
#   - Proper restart policies
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================================

version: "3.9"

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL - Production Configuration
  # ----------------------------------------------------------------------------
  postgres:
    restart: always
    environment:
      # Production logging (less verbose)
      POSTGRES_LOG_STATEMENT: none
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M

  # ----------------------------------------------------------------------------
  # API - Production Configuration
  # ----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
      args:
        - NODE_ENV=production
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=10&pool_timeout=30
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # ----------------------------------------------------------------------------
  # POS - Production Configuration
  # ----------------------------------------------------------------------------
  pos:
    build:
      context: .
      dockerfile: apps/pos-desktop/Dockerfile
      target: runner
      args:
        - NODE_ENV=production
    restart: always
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # ----------------------------------------------------------------------------
  # System Admin - Production Configuration
  # ----------------------------------------------------------------------------
  system-admin:
    build:
      context: .
      dockerfile: apps/system-admin/Dockerfile
      target: runner
      args:
        - NODE_ENV=production
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_TELEMETRY_DISABLED: 1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
